# This is a workflow name
name: Hello 

# runs on a trigger
on: 
  push:
    branches: [main]

# These are jobs inside the workflow
jobs:

# this is the name of the job
 greet:
  # this is github runner
  runs-on: ubuntu-latest
  steps:
    - name: say hello to users 
      run: echo "hello users"

    - name: say hello to username
      run: echo "hello $(whoami)"
