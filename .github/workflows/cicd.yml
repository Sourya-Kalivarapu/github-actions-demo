# This is the name of the workflow displayed in the actions tab
name: CICD

# Manual click (deliver) workflow whenever user needs
on: 
  workflow_dispatch:
    inputs:
      environments:
        description: This is the environment where the workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  # Every job needs a separate runner: it's called parallelism 
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "code clone from GitHub"

  build:
   needs: [code]
   runs-on: ubuntu-latest
   steps:
     - name: Build Docker Container
       run: echo "Docker Container build"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"

  deploy:
    if: inputs.environment == 'dev'
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo " Docker compose deployed the app"
 
        

        

    
